<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senpixel Messenger</title>
    <!-- Заглушка для иконки, чтобы не было ошибки 404 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💬</text></svg>">
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #0b0e11; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #auth-container, #chat-container { display: none; flex-direction: column; height: 100%; padding: 20px; box-sizing: border-box; }
        input, button { padding: 14px; margin: 8px 0; border-radius: 12px; border: none; outline: none; font-size: 16px; }
        input { background: #1f2227; color: white; border: 1px solid #2d3139; }
        button { background: #ff3333; color: white; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        button:active { opacity: 0.8; }
        #messages { flex: 1; overflow-y: auto; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: #1f2227; padding: 12px; border-radius: 14px; max-width: 85%; align-self: flex-start; line-height: 1.4; }
        .my-msg { align-self: flex-end; background: #ff3333; }
        .header { padding-bottom: 20px; border-bottom: 1px solid #1f2227; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <!-- Экран входа -->
    <div id="auth-container" style="display: flex;">
        <h2 style="text-align: center;">Senpixel Chat</h2>
        <p style="color: #888; text-align: center; font-size: 14px;">Введи почту и пароль для входа</p>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">
        <button onclick="handleAuth('signIn')">Войти</button>
        <button onclick="handleAuth('signUp')" style="background: transparent; color: #ff3333; border: 1px solid #ff3333;">Создать аккаунт</button>
    </div>

    <!-- Экран чата -->
    <div id="chat-container">
        <div class="header">
            <span>Senpixel Messenger</span>
            <button onclick="signOut()" style="padding: 5px 10px; font-size: 12px; background: #2d3139;">Выйти</button>
        </div>
        <div id="messages"></div>
        <div style="display: flex; gap: 10px; background: #0b0e11; padding-top: 10px;">
            <input type="text" id="msgInput" placeholder="Написать..." style="flex: 1;">
            <button onclick="sendMessage()" style="padding: 10px 20px;">➜</button>
        </div>
    </div>

    <script>
        // ТВОИ ДАННЫЕ ВСТАВЛЕНЫ
        const SB_URL = "https://kwotdvdjxhpttuwhgjkh.supabase.co";
        const SB_KEY = "sb_publishable_i6HL03F98ZmxCKmAKQDaLQ_w6u7ep4d";

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const authCont = document.getElementById('auth-container');
        const chatCont = document.getElementById('chat-container');
        const messagesDiv = document.getElementById('messages');

        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (!email || !password) return alert('Заполни все поля');

            const { data, error } = type === 'signUp' 
                ? await supabaseClient.auth.signUp({ email, password })
                : await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) alert(error.message);
            else checkUser();
        }

        async function signOut() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                authCont.style.display = 'none';
                chatCont.style.display = 'flex';
                loadMessages();
                
                // Realtime подписка
                supabaseClient.channel('public:messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    addMessageToUI(payload.new, user.email);
                }).subscribe();
            }
        }

        async function loadMessages() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const { data } = await supabaseClient.from('messages').select('*').order('created_at', { ascending: true }).limit(50);
            messagesDiv.innerHTML = '';
            if (data) data.forEach(m => addMessageToUI(m, user.email));
        }

        function addMessageToUI(msg, currentEmail) {
            const div = document.createElement('div');
            const isMy = msg.user_email === currentEmail;
            div.className = isMy ? 'msg my-msg' : 'msg';
            div.innerHTML = `<small style="display:block; font-size:10px; opacity:0.6;">${msg.user_email.split('@')[0]}</small>${msg.content}`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (input.value.trim() && user) {
                const text = input.value;
                input.value = '';
                const { error } = await supabaseClient.from('messages').insert([{ content: text, user_email: user.email }]);
                if (error) {
                    console.error(error);
                    alert('Ошибка отправки. Проверь настройки RLS в Supabase.');
                }
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log("SW error", err));
        }

        checkUser();
    </script>
</body>
</html>
