<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Senpixel v5.5 // Evolution</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; worker-src 'self' blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.supabase.co;">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --neon: #00ffa2; --blue: #00e5ff; --dark: #05070a;
            --glass: rgba(10, 15, 25, 0.9); --border: rgba(0, 255, 162, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        /* Живой фон: Цифровая Сетка + Глоу */
        body {
            background: var(--dark); color: #fff; height: 100vh; overflow: hidden; display: flex;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 255, 162, 0.05), transparent),
                linear-gradient(var(--border) 1px, transparent 1px), 
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            animation: pulseBg 10s ease-in-out infinite;
        }

        @keyframes pulseBg {
            0%, 100% { background-position: 0 0; }
            50% { background-position: 20px 20px; }
        }

        /* Auth Screen */
        #auth-gate {
            position: fixed; inset: 0; background: var(--dark); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }

        .neo-card {
            background: var(--glass); padding: 40px; border-radius: 20px;
            border: 1px solid var(--neon); box-shadow: 0 0 50px rgba(0, 255, 162, 0.15);
            width: 350px; text-align: center; backdrop-filter: blur(20px);
        }

        input, textarea {
            width: 100%; padding: 15px; margin: 10px 0; background: rgba(0,0,0,0.5);
            border: 1px solid var(--border); color: #fff; border-radius: 10px; outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--blue); box-shadow: 0 0 10px var(--blue); }

        button {
            width: 100%; padding: 15px; background: var(--neon); color: #000;
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--neon); }

        /* Main App Layout */
        #app { display: none; width: 100%; height: 100%; flex-direction: row; }

        .sidebar {
            width: 320px; background: rgba(0, 0, 0, 0.6); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; backdrop-filter: blur(10px);
        }

        .nav-link {
            padding: 15px 25px; cursor: pointer; color: #7f91a4; font-weight: 500;
            transition: 0.3s; border-left: 3px solid transparent;
        }

        .nav-link.active {
            color: var(--neon); background: rgba(0, 255, 162, 0.05); border-left-color: var(--neon);
        }

        .content-area { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* Чат блоки */
        .chat-view { display: none; flex: 1; flex-direction: column; }
        .chat-view.active { display: flex; }

        #messages {
            flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px;
        }

        .msg-bubble {
            max-width: 70%; padding: 12px 18px; border-radius: 15px;
            position: relative; animation: msgFade 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        @keyframes msgFade { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .msg-bubble.own { align-self: flex-end; background: var(--neon); color: #000; border-bottom-right-radius: 2px; }
        .msg-bubble.other { align-self: flex-start; background: rgba(255,255,255,0.1); border-bottom-left-radius: 2px; }

        .status-bar {
            height: 30px; background: #000; font-size: 10px; padding: 0 20px;
            display: flex; align-items: center; color: var(--blue); font-family: monospace;
            border-bottom: 1px solid var(--border);
        }

        .input-box {
            padding: 20px; background: rgba(0,0,0,0.8); display: flex; gap: 15px; align-items: flex-end;
        }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div class="neo-card">
            <h1 style="color: var(--neon); margin-bottom: 10px;">SENPIXEL</h1>
            <p style="font-size: 12px; color: var(--blue); margin-bottom: 20px;">CRYPTO-READY INTERFACE</p>
            <input type="email" id="u-email" placeholder="E-mail">
            <input type="password" id="u-pass" placeholder="Password">
            <button id="btn-login">ENTER DOMAIN</button>
            <button id="btn-reg" style="background:none; border: 1px solid var(--neon); color: var(--neon); margin-top: 10px;">NEW NODE</button>
            <p id="auth-err" style="color: #ff4757; font-size: 11px; margin-top: 15px;"></p>
        </div>
    </div>

    <div id="app">
        <div class="sidebar">
            <div style="padding: 30px; font-weight: 800; font-size: 1.5rem; color: var(--neon);">NEXUS v5.5</div>
            <div class="nav-link active" data-view="view-chat">💬 SECURE CHAT</div>
            <div class="nav-link" data-view="view-ai">🤖 AI EVOLUTION</div>
            <div class="nav-link" data-view="view-settings">⚙️ CORE CONFIG</div>
            <div id="user-display" style="margin-top: auto; padding: 20px; font-size: 11px; border-top: 1px solid var(--border);"></div>
        </div>

        <div class="content-area">
            <div class="status-bar" id="sentinel-txt">> SYSTEM READY. ENCRYPTION: ACTIVE</div>

            <div id="view-chat" class="chat-view active">
                <div id="messages"></div>
                <div class="input-box">
                    <textarea id="msg-input" rows="1" placeholder="Type secure packet..."></textarea>
                    <button id="msg-send" style="width: 80px;">SEND</button>
                </div>
            </div>

            <div id="view-ai" class="chat-view">
                <div style="padding: 40px;">
                    <h2>🤖 AI Self-Healing System</h2>
                    <p style="color: var(--blue); margin-bottom: 20px;">Мониторинг кода и автоматическая оптимизация памяти.</p>
                    <div id="ai-status" style="background: #000; padding: 20px; border-radius: 10px; border: 1px solid var(--border); font-family: monospace;">
                        > Scanner: Online<br>
                        > Memory Health: 98%<br>
                        > Code Integrity: Verified
                    </div>
                    <button id="run-diag" style="margin-top: 20px;">Запустить самодиагностику</button>
                </div>
            </div>
            
            <div id="view-settings" class="chat-view">
                <div style="padding: 40px;">
                    <h2>⚙️ Node Settings</h2>
                    <button id="logout" style="background: #ff4757; margin-top: 20px;">TERMINATE SESSION</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
