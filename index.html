<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senpixel Hyper-Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #3ecf8e; --bg: #0b0e11; --card: #151921; --text: #e0e6ed; --accent: #8e44ad; }
        body, html { margin: 0; padding: 0; height: 100vh; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        #app { display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 70px; background: var(--card); border-right: 1px solid #282828; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 20px; }
        .nav-btn { font-size: 1.3rem; cursor: pointer; color: #555; transition: 0.3s; padding: 10px; border-radius: 12px; }
        .nav-btn.active { color: var(--primary); background: rgba(62, 207, 142, 0.1); }
        
        /* Main Area */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .header { padding: 15px 20px; background: var(--card); border-bottom: 1px solid #282828; display: flex; justify-content: space-between; align-items: center; }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        
        /* Bubbles */
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 15px; animation: slideUp 0.3s ease; line-height: 1.4; position: relative; }
        .msg.sent { align-self: flex-end; background: var(--primary); color: #000; border-bottom-right-radius: 4px; }
        .msg.received { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; }
        .msg.official { align-self: center; background: linear-gradient(45deg, #1e1e1e, #2a2a2a); border: 1px solid gold; color: gold; text-align: center; max-width: 90%; }
        
        .meta { font-size: 0.7rem; opacity: 0.6; margin-bottom: 3px; display: flex; justify-content: space-between; }
        .status-check { font-size: 0.7rem; margin-left: 5px; }
        .status-check.read { color: #3498db; }

        /* Typing */
        #typing { height: 20px; padding: 0 20px; font-size: 0.75rem; color: var(--primary); opacity: 0; transition: 0.2s; }

        /* Input */
        .input-area { padding: 15px; background: var(--card); display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #0b0e11; color: white; outline: none; }
        
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h1 style="color: var(--primary); letter-spacing: 5px;">SENPIXEL</h1>
        <button onclick="login()" style="padding: 12px 24px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer;">Войти через Google</button>
    </div>

    <div id="app">
        <div class="sidebar">
            <div class="nav-btn active" id="tab-all" onclick="switchTab('all')"><i class="fa-solid fa-message"></i></div>
            <div class="nav-btn" id="tab-off" onclick="switchTab('official')"><i class="fa-solid fa-bullhorn"></i></div>
            <div class="nav-btn" onclick="callAI()" style="color: var(--accent)"><i class="fa-solid fa-robot"></i></div>
        </div>

        <div class="main">
            <div class="header">
                <b id="title">Общий чат</b>
                <span id="user-display" style="font-size: 0.8rem; opacity: 0.7;"></span>
            </div>

            <div id="messages"></div>
            <div id="typing"></div>

            <div class="input-area" id="input-box">
                <input type="text" id="userInput" placeholder="Сообщение..." oninput="sendTyping()" onkeypress="if(event.key==='Enter') sendMsg()">
                <button onclick="sendMsg()" style="background: var(--primary); border: none; width: 40px; height: 40px; border-radius: 10px; cursor: pointer;"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://kwotdvdjxhpttuwhgjkh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_i6HL03F98ZmxCKmAKQDaLQ_w6u7ep4d';
        const ADMIN_EMAIL = 'm40503528@gmail.com';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let user = null;
        let currentTab = 'all';
        let typeTimer;

        async function init() {
            const { data } = await sb.auth.getSession();
            if (data.session) setup(data.session.user);
        }

        async function login() {
            await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
        }

        function setup(u) {
            user = u;
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('user-display').innerText = user.email;
            loadMsgs();
            subscribe();
        }

        async function switchTab(t) {
            currentTab = t;
            document.getElementById('tab-all').classList.toggle('active', t === 'all');
            document.getElementById('tab-off').classList.toggle('active', t === 'official');
            document.getElementById('title').innerText = t === 'all' ? 'Общий чат' : 'Официальный канал';
            document.getElementById('input-box').style.visibility = (t === 'official' && user.email !== ADMIN_EMAIL) ? 'hidden' : 'visible';
            loadMsgs();
        }

        async function loadMsgs() {
            let q = sb.from('messages').select('*').order('created_at', { ascending: true });
            q = (currentTab === 'official') ? q.eq('is_official', true) : q.eq('is_official', false);
            
            const { data } = await q;
            const cont = document.getElementById('messages');
            cont.innerHTML = '';
            if (data) data.forEach(drawMsg);
            markRead();
        }

        function drawMsg(m) {
            const cont = document.getElementById('messages');
            const isMe = m.user_id === user.id;
            const div = document.createElement('div');
            
            const checks = isMe ? `<span class="status-check ${m.is_read ? 'read' : ''}"><i class="fa-solid fa-check-double"></i></span>` : '';
            
            div.className = `msg ${m.is_official ? 'official' : (isMe ? 'sent' : 'received')}`;
            div.innerHTML = `
                <div class="meta"><span>${m.user_email.split('@')[0]}</span></div>
                <div>${m.text} ${checks}</div>
            `;
            cont.appendChild(div);
            cont.scrollTop = cont.scrollHeight;
        }

        async function sendMsg() {
            const inp = document.getElementById('userInput');
            const val = inp.value.trim();
            if (!val) return;

            await sb.from('messages').insert([{
                text: val, user_id: user.id, user_email: user.email,
                is_official: (currentTab === 'official'), is_read: false
            }]);
            inp.value = '';
            sb.from('typing_status').upsert({ user_id: user.id, is_typing: false });
        }

        async function sendTyping() {
            sb.from('typing_status').upsert({ user_id: user.id, user_email: user.email, is_typing: true });
            clearTimeout(typeTimer);
            typeTimer = setTimeout(() => sb.from('typing_status').upsert({ user_id: user.id, is_typing: false }), 2000);
        }

        async function markRead() {
            await sb.from('messages').update({ is_read: true }).eq('is_read', false).neq('user_id', user.id);
        }

        function subscribe() {
            sb.channel('any')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, (p) => {
                if (p.eventType === 'INSERT') {
                    const m = p.new;
                    if ((currentTab === 'official' && m.is_official) || (currentTab === 'all' && !m.is_official)) drawMsg(m);
                    if (m.user_id !== user.id) markRead();
                } else { loadMsgs(); }
            })
            .on('postgres_changes', { event: '*', schema: 'public', table: 'typing_status' }, (p) => {
                const t = document.getElementById('typing');
                if (p.new.user_id !== user.id && p.new.is_typing) {
                    t.innerText = p.new.user_email.split('@')[0] + ' печатает...';
                    t.style.opacity = 1;
                } else { t.style.opacity = 0; }
            })
            .subscribe();
        }

        function callAI() {
            const cont = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'msg received';
            div.style.border = '1px solid var(--accent)';
            div.innerHTML = `<div class="meta" style="color:var(--accent)">Senpixel AI</div><div>Я на связи! Как я могу помочь в разработке проекта?</div>`;
            cont.appendChild(div);
            cont.scrollTop = cont.scrollHeight;
        }

        init();
    </script>
</body>
</html>
