<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Senpixel Omni v4.1 // Nexus</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --neon: #00ffa2; --blue: #00e5ff; --bg: #030508;
            --panel: rgba(10, 15, 20, 0.85); --border: rgba(0, 255, 162, 0.2);
        }

        /* Живые обои */
        body {
            margin: 0; height: 100vh; background: var(--bg); color: var(--neon);
            font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px; animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove { from { background-position: 0 0; } to { background-position: 40px 40px; } }

        /* Авторизация */
        #auth-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; align-items: center; justify-content: center; z-index: 10000;
        }
        .auth-card {
            background: var(--panel); backdrop-filter: blur(15px); padding: 40px;
            border: 1px solid var(--neon); border-radius: 15px; width: 320px; text-align: center;
        }
        input {
            width: 100%; padding: 12px; margin: 10px 0; background: #000;
            border: 1px solid var(--border); color: #fff; border-radius: 8px; outline: none;
        }
        button {
            width: 100%; padding: 12px; background: var(--neon); color: #000;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        /* Главный интерфейс */
        #app { display: none; height: 100vh; width: 100vw; flex-direction: row; }
        
        /* Боковая панель (Sidebar) */
        .sidebar {
            width: 300px; background: var(--panel); backdrop-filter: blur(10px);
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
        }
        .nav-tabs { display: flex; padding: 10px; gap: 5px; background: rgba(0,0,0,0.3); }
        .tab-btn {
            flex: 1; padding: 10px; font-size: 12px; background: transparent;
            color: #7f91a4; border: 1px solid transparent; border-radius: 8px; cursor: pointer;
        }
        .tab-btn.active { color: var(--neon); border-color: var(--neon); background: rgba(0,255,162,0.05); }

        /* Основная зона */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
        .view-container { display: none; flex: 1; flex-direction: column; height: 100%; }
        .view-container.active { display: flex; }

        /* Чат */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg {
            max-width: 70%; padding: 10px 15px; border-radius: 12px; font-size: 14px;
            animation: slideUp 0.3s ease; line-height: 1.4;
        }
        .msg.own { align-self: flex-end; background: rgba(0,255,162,0.1); border: 1px solid var(--neon); }
        .msg.other { align-self: flex-start; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Sentinel Monitor (Верхняя панель) */
        #sentinel-monitor {
            height: 60px; background: rgba(0,0,0,0.6); border-bottom: 1px solid var(--border);
            padding: 5px 20px; font-size: 10px; color: var(--blue); overflow-y: hidden;
        }

        /* Ввод */
        .input-area { padding: 20px; display: flex; gap: 10px; background: var(--panel); }
        textarea {
            flex: 1; background: #000; border: 1px solid var(--border); color: #fff;
            padding: 12px; border-radius: 12px; resize: none; outline: none;
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="color:var(--neon)">NEXUS AUTH</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button id="loginBtn">LOG IN</button>
            <button id="regBtn" style="background:transparent; border:1px solid var(--neon); color:var(--neon)">REGISTER</button>
            <p id="auth-error" style="color:red; font-size:10px; margin-top:10px;"></p>
        </div>
    </div>

    <div id="app">
        <div class="sidebar">
            <div style="padding: 20px; font-weight: bold; font-size: 18px;">SENPIXEL <span style="font-size: 10px; color: var(--blue);">v4.1</span></div>
            <div class="nav-tabs">
                <button class="tab-btn active" data-target="view-chat">CHATS</button>
                <button class="tab-btn" data-target="view-ai">AI</button>
                <button class="tab-btn" data-target="view-settings">SETTINGS</button>
            </div>
            <div id="chat-list" style="padding: 10px;">
                <div style="padding: 15px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer;">📢 Global Cryptonode</div>
            </div>
        </div>

        <div class="main-content">
            <div id="sentinel-monitor">Initializing Titan Core...</div>

            <div id="view-chat" class="view-container active">
                <div id="chat-window"></div>
                <div class="input-area">
                    <textarea id="msgInput" rows="1" placeholder="Type encrypted message..."></textarea>
                    <button id="sendBtn" style="width: auto;">SEND</button>
                </div>
            </div>

            <div id="view-ai" class="view-container" style="padding: 40px;">
                <h3>🤖 Sentinel Intelligence</h3>
                <textarea id="aiPrompt" style="height: 100px;" placeholder="Ask AI..."></textarea>
                <button id="askAi">GENERATE RESPONSE</button>
                <div id="aiResponse" style="margin-top:20px; padding:20px; background:rgba(0,0,0,0.5); border: 1px solid var(--blue);"></div>
            </div>

            <div id="view-settings" class="view-container" style="padding: 40px;">
                <h3>⚙️ Profile Node Settings</h3>
                <div id="user-info" style="margin-bottom: 20px;"></div>
                <button id="logoutBtn" style="background: #ff3333;">DISCONNECT (LOGOUT)</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
