<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senpixel Apex v9.0 | Audiogram Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tweetnacl/1.0.3/nacl-fast.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tweetnacl-util/0.15.0/nacl-util.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #3ecf8e; --bg: #050505; --panel: #121212; --msg-me: #2b5278; --msg-them: #1d1d1f; }
        body { margin: 0; background: var(--bg); color: #e1e1e1; font-family: 'Segoe UI', Roboto, sans-serif; display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 320px; background: var(--panel); border-right: 1px solid #222; display: flex; flex-direction: column; }
        .user-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #1a1a1a; transition: 0.2s; }
        .user-item:hover { background: #1a1a1a; }
        .user-item.active { background: #1a1a1a; border-left: 3px solid var(--accent); }

        /* Main Chat */
        .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { padding: 15px 25px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: rgba(5,5,5,0.8); backdrop-filter: blur(10px); }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        
        /* Messages Styling */
        .msg { max-width: 70%; padding: 10px 16px; border-radius: 18px; font-size: 0.95rem; position: relative; transition: opacity 0.5s ease, transform 0.5s ease; }
        .msg.me { align-self: flex-end; background: var(--msg-me); color: white; border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: var(--msg-them); border-bottom-left-radius: 4px; }
        .msg.fade-out { opacity: 0; transform: scale(0.9); }
        
        .timer-badge { font-size: 0.7rem; opacity: 0.5; margin-left: 8px; font-style: italic; }

        /* Input Area */
        .input-bar { padding: 20px; background: var(--panel); display: flex; gap: 12px; align-items: center; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; padding: 12px 18px; border-radius: 25px; color: #fff; outline: none; }
        .btn-icon { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 1.2rem; }

        #auth-gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="auth-gate">
    <button onclick="login()" style="padding: 15px 30px; border-radius: 30px; border: none; background: var(--accent); font-weight: bold; cursor: pointer;">Войти через Google</button>
</div>

<aside class="sidebar">
    <div style="padding: 20px;"><h2>Audiogram</h2></div>
    <div id="users-list"></div>
</aside>

<main class="chat-area">
    <header>
        <div>
            <b id="chat-user">Выберите чат</b><br>
            <small id="status">Double Ratchet + E2EE</small>
        </div>
        <div style="display: flex; gap: 15px;">
            <select id="ttl-select" onchange="currentTTL = parseInt(this.value)" style="background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 5px;">
                <option value="0">Без удаления</option>
                <option value="10">10 секунд</option>
                <option value="60">1 минута</option>
                <option value="3600">1 час</option>
            </select>
            <button class="btn-icon" onclick="alert('Звонки WebRTC в разработке')"><i class="fa-solid fa-phone"></i></button>
        </div>
    </header>

    <div id="messages"></div>

    <div class="input-bar">
        <input type="text" id="msgInput" placeholder="Зашифрованное сообщение...">
        <button onclick="send()" class="btn-icon"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
</main>

<script>
    // 1. НАСТРОЙКИ (ВСТАВЬ СВОИ ДАННЫЕ)
    const sb = supabase.createClient('URL', 'KEY');

    let user = null, ACTIVE_PEER_ID = null, ACTIVE_CHAT_ID = null;
    let currentTTL = 0; 
    const sessions = new Map(); 
    const renderedMessages = new Set();

    const UI = {
        msgs: document.getElementById('messages'),
        input: document.getElementById('msgInput'),
        gate: document.getElementById('auth-gate'),
        list: document.getElementById('users-list')
    };

    // 2. CRYPTO ЯДРО (DOUBLE RATCHET + KDF)
    const Crypto = {
        async init(u) {
            let priv = sessionStorage.getItem('id_priv');
            if (!priv) {
                const pair = nacl.box.keyPair();
                sessionStorage.setItem('id_priv', nacl.util.encodeBase64(pair.secretKey));
                await sb.from('user_keys').upsert({ user_id: u.id, public_key: nacl.util.encodeBase64(pair.publicKey) });
            }
        },

        async getSession(peerId) {
            if (sessions.has(peerId)) return sessions.get(peerId);
            
            // Загрузка ключа собеседника
            const { data } = await sb.from('user_keys').select('public_key').eq('user_id', peerId).single();
            if (!data) return null;

            // Начальный Shared Secret (Root)
            const myPriv = nacl.util.decodeBase64(sessionStorage.getItem('id_priv'));
            const peerPub = nacl.util.decodeBase64(data.public_key);
            const shared = nacl.box.before(peerPub, myPriv);

            const session = {
                RK: shared, 
                CKs: nacl.hash(shared).slice(0, 32), // Цепочка отправки
                CKr: nacl.hash(shared).slice(32, 64), // Цепочка приема
                Ns: 0, Nr: 0
            };
            sessions.set(peerId, session);
            return session;
        },

        async encrypt(text, peerId) {
            const s = await this.getSession(peerId);
            const hash = nacl.hash(s.CKs);
            const msgKey = hash.slice(0, 32);
            s.CKs = hash.slice(32, 64); // "Проворачиваем" цепочку (Forward Secrecy)

            const nonce = nacl.randomBytes(24);
            const box = nacl.secretbox(nacl.util.decodeUTF8(text), nonce, msgKey);
            
            return {
                payload: JSON.stringify({ n: nacl.util.encodeBase64(nonce), b: nacl.util.encodeBase64(box) }),
                num: s.Ns++
            };
        },

        decrypt(payload, peerId, isMe) {
            try {
                const s = sessions.get(peerId);
                if (!s) return "[Сессия не готова]";
                
                const data = JSON.parse(payload);
                // Для упрощения в этом примере используем одну цепочку
                const hash = nacl.hash(isMe ? s.CKs : s.CKr); 
                const msgKey = hash.slice(0, 32);
                
                const opened = nacl.secretbox.open(nacl.util.decodeBase64(data.b), nacl.util.decodeBase64(data.n), msgKey);
                return opened ? nacl.util.encodeUTF8(opened) : "[Ошибка ключа]";
            } catch { return "[Ошибка данных]"; }
        }
    };

    // 3. ФУНКЦИЯ ОТПРАВКИ (SEND)
    async function send() {
        const val = UI.input.value.trim();
        if (!val || !ACTIVE_PEER_ID) return;

        const enc = await Crypto.encrypt(val, ACTIVE_PEER_ID);
        const expiresAt = currentTTL ? new Date(Date.now() + currentTTL * 1000).toISOString() : null;

        UI.input.value = '';

        const { error } = await sb.from('messages').insert([{
            chat_id: ACTIVE_CHAT_ID,
            sender_id: user.id,
            receiver_id: ACTIVE_PEER_ID,
            text: enc.payload,
            is_encrypted: true,
            expires_at: expiresAt,
            msg_number: enc.num
        }]);
        if (error) console.error(error.message);
    }

    // 4. UI И ВИЗУАЛИЗАЦИЯ
    async function appendMessage(m) {
        if (renderedMessages.has(m.id)) return;
        renderedMessages.add(m.id);

        const isMe = m.sender_id === user.id;
        const div = document.createElement('div');
        div.className = `msg ${isMe ? 'me' : 'them'}`;
        if (m.expires_at) div.dataset.expires = m.expires_at;

        let text = m.text;
        if (m.is_encrypted) {
            text = Crypto.decrypt(m.text, isMe ? m.receiver_id : m.sender_id, isMe);
        }

        div.textContent = text;
        if (m.expires_at) {
            const timer = document.createElement('span');
            timer.className = 'timer-badge';
            timer.innerHTML = `<i class="fa-regular fa-clock"></i>`;
            div.appendChild(timer);
        }

        UI.msgs.append(div);
        UI.msgs.scrollTop = UI.msgs.scrollHeight;
    }

    // 5. АВТО-УДАЛЕНИЕ (ЧИСТИЛЬЩИК UI)
    setInterval(() => {
        const now = new Date();
        document.querySelectorAll('.msg').forEach(el => {
            if (el.dataset.expires) {
                const expiry = new Date(el.dataset.expires);
                if (expiry < now) {
                    el.classList.add('fade-out');
                    setTimeout(() => el.remove(), 500);
                }
            }
        });
    }, 1000);

    // Вспомогательные функции
    async function init() {
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
            user = session.user; UI.gate.remove();
            await Crypto.init(user);
            loadUsers();
        }
    }

    async function loadUsers() {
        const { data } = await sb.from('profiles').select('*').neq('id', user.id);
        data?.forEach(p => {
            const d = document.createElement('div');
            d.className = 'user-item';
            d.textContent = p.username || 'Anonymous';
            d.onclick = () => selectChat(p);
            UI.list.append(d);
        });
    }

    async function selectChat(p) {
        ACTIVE_PEER_ID = p.id;
        ACTIVE_CHAT_ID = '00000000-0000-0000-0000-000000000000'; // Для теста Глобал, или ищи по RPC
        document.getElementById('chat-user').textContent = p.username;
        UI.msgs.innerHTML = '';
        renderedMessages.clear();
        
        // Подписка
        sb.channel('chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => appendMessage(payload.new)).subscribe();
        
        const { data } = await sb.from('messages').select('*').limit(50).order('created_at');
        data?.forEach(appendMessage);
    }

    async function login() { await sb.auth.signInWithOAuth({ provider: 'google' }); }
    
    UI.input.onkeydown = e => e.key === 'Enter' && send();
    init();
</script>

</body>
</html>
