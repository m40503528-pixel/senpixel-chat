<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senpixel Apex</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent: #3ecf8e;
            --bg: #05070a;
            --panel: rgba(17, 24, 39, 0.8);
            --glass: rgba(255, 255, 255, 0.03);
            --text: #f3f4f6;
            --radius: 16px;
        }

        * { box-sizing: border-box; outline: none; }
        body, html { margin: 0; padding: 0; height: 100vh; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        /* Animated Background */
        #canvas-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at top right, #111827, #05070a); }
        .blob { position: absolute; width: 300px; height: 300px; background: var(--accent); filter: blur(120px); opacity: 0.1; border-radius: 50%; animation: move 20s infinite alternate; }
        @keyframes move { from { transform: translate(0,0); } to { transform: translate(100vw, 100vh); } }

        #app { display: flex; height: 100vh; backdrop-filter: blur(20px); }

        /* Sidebar - Folders Style */
        .sidebar { width: 320px; background: var(--panel); border-right: 1px solid var(--glass); display: flex; flex-direction: column; }
        .folders { display: flex; padding: 10px; gap: 10px; border-bottom: 1px solid var(--glass); overflow-x: auto; }
        .folder { padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; background: var(--glass); }
        .folder.active { background: var(--accent); color: #000; font-weight: bold; }

        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .chat-item:hover { background: var(--glass); }
        .chat-item.active { background: rgba(62, 207, 142, 0.1); }
        .avatar { width: 48px; height: 48px; border-radius: 15px; background: #1f2937; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border: 1px solid var(--glass); }

        /* Chat Window */
        .main { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.3); }
        .header { padding: 15px 25px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass); }

        #messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 70%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; animation: msgFade 0.3s ease; }
        .msg.sent { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 4px; }
        .msg.received { align-self: flex-start; background: var(--panel); border: 1px solid var(--glass); border-bottom-left-radius: 4px; }
        .msg.ai { border: 1px solid #8e44ad; background: rgba(142, 68, 173, 0.1); }

        /* Input Area */
        .input-bar { padding: 20px; background: var(--panel); display: flex; gap: 12px; align-items: center; }
        input { flex: 1; padding: 14px 20px; border-radius: 25px; border: 1px solid var(--glass); background: var(--bg); color: #fff; }
        .icon-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: var(--accent); color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Settings Panel */
        #settings { position: fixed; right: -400px; top: 0; bottom: 0; width: 380px; background: #0d1117; z-index: 1000; transition: 0.4s; padding: 30px; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        #settings.open { right: 0; }
        .set-group { margin-bottom: 25px; background: var(--glass); padding: 15px; border-radius: 12px; }

        @keyframes msgFade { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="canvas-bg"><div class="blob"></div></div>

    <div id="app">
        <aside class="sidebar">
            <div style="padding: 20px; font-weight: 900; letter-spacing: 2px; color: var(--accent);">SENPIXEL APEX</div>
            <div class="folders">
                <div class="folder active">Все</div>
                <div class="folder">Личные</div>
                <div class="folder">Каналы</div>
                <div class="folder">ИИ</div>
            </div>
            <div class="chat-list" id="chatList">
                <div class="chat-item" onclick="selectChat('public', 'Общий чат', '#')">
                    <div class="avatar"><i class="fa-solid fa-users"></i></div>
                    <div><b>Общий чат</b><br><small style="color:var(--accent)">Публичный</small></div>
                </div>
                <div class="chat-item" onclick="selectChat('my_channel', 'Мой канал 👑', '⭐')">
                    <div class="avatar" style="color: gold">⭐</div>
                    <div><b>Мой канал</b><br><small>Только владелец</small></div>
                </div>
                <div class="chat-item" onclick="selectChat('ai_chat', 'Senpixel AI', '🤖')">
                    <div class="avatar" style="color: #8e44ad">🤖</div>
                    <div><b>Senpixel AI</b><br><small>Искусственный интеллект</small></div>
                </div>
                <hr style="border:0; border-top:1px solid var(--glass)">
                <div id="contacts"></div>
            </div>
            <button onclick="toggleSet()" style="margin: 15px; padding: 12px; background: var(--glass); color: #fff; border: 1px solid var(--glass); border-radius: 10px; cursor: pointer;"><i class="fa-solid fa-gear"></i> Настройки</button>
        </aside>

        <main class="main">
            <div class="header">
                <h3 id="chatTitle">Выберите чат</h3>
                <div id="userEmail" style="font-size: 0.7rem; opacity: 0.5;"></div>
            </div>
            <div id="messages"></div>
            <div id="typing" style="padding: 0 25px; height: 20px; font-size: 0.7rem; color: var(--accent);"></div>
            <div class="input-bar" id="inputBar">
                <input type="text" id="msgInput" placeholder="Введите сообщение..." oninput="isTyping()" onkeypress="if(event.key==='Enter') send()">
                <button class="icon-btn" onclick="send()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </main>
    </div>

    <div id="settings">
        <h2>Настройки</h2>
        <div class="set-group">
            <label><i class="fa-solid fa-palette"></i> Цвет акцента</label><br><br>
            <input type="color" id="accentColor" value="#3ecf8e" onchange="applyColor(this.value)" style="width: 100%; height: 40px; border:none; background:none;">
        </div>
        <div class="set-group">
            <label><i class="fa-solid fa-bell"></i> Уведомления</label>
            <input type="checkbox" checked style="float: right;">
        </div>
        <div class="set-group">
            <label><i class="fa-solid fa-image"></i> Живой фон</label>
            <input type="range" min="0" max="100" value="10" oninput="document.querySelector('.blob').style.opacity = this.value/100" style="width: 100%;">
        </div>
        <div class="set-group" onclick="location.reload()" style="cursor:pointer; color: #ff4d4d; text-align:center;">
            <i class="fa-solid fa-trash"></i> Очистить кэш и перезагрузить
        </div>
        <button onclick="toggleSet()" style="width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--accent); font-weight: bold; cursor: pointer;">Готово</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://kwotdvdjxhpttuwhgjkh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_i6HL03F98ZmxCKmAKQDaLQ_w6u7ep4d';
        const ADMIN = 'm40503528@gmail.com';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let user = null, activeChat = 'public', chatType = 'public';

        async function init() {
            const { data } = await sb.auth.getSession();
            if (!data.session) {
                await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
            } else {
                user = data.session.user;
                document.getElementById('userEmail').innerText = user.email;
                loadContacts();
                loadMsgs();
                subscribe();
            }
        }

        function selectChat(id, title, icon) {
            activeChat = id;
            document.getElementById('chatTitle').innerText = title;
            chatType = (id === 'my_channel') ? 'channel' : (id === 'ai_chat' ? 'ai' : (id === 'public' ? 'public' : 'private'));
            
            // Если это мой канал и я не админ - скрываем ввод
            document.getElementById('inputBar').style.visibility = (chatType === 'channel' && user.email !== ADMIN) ? 'hidden' : 'visible';
            
            loadMsgs();
        }

        async function loadContacts() {
            const { data } = await sb.from('messages').select('user_id, user_email');
            if (!data) return;
            const unique = [...new Map(data.map(i => [i.user_id, i])).values()].filter(u => u.user_id !== user.id);
            const cont = document.getElementById('contacts');
            cont.innerHTML = unique.map(u => `
                <div class="chat-item" onclick="selectChat('${u.user_id}', '${u.user_email.split('@')[0]}', '👤')">
                    <div class="avatar">👤</div>
                    <div><b>${u.user_email.split('@')[0]}</b><br><small>Личное сообщение</small></div>
                </div>
            `).join('');
        }

        async function loadMsgs() {
            let q = sb.from('messages').select('*').order('created_at', { ascending: true });
            
            if (chatType === 'public') q = q.eq('chat_type', 'public');
            else if (chatType === 'channel') q = q.eq('chat_type', 'channel');
            else if (chatType === 'ai') q = q.eq('chat_type', 'ai').eq('user_id', user.id);
            else q = q.or(`and(user_id.eq.${user.id},receiver_id.eq.${activeChat}),and(user_id.eq.${activeChat},receiver_id.eq.${user.id})`);

            const { data } = await q;
            const mDiv = document.getElementById('messages');
            mDiv.innerHTML = '';
            if (data) data.forEach(draw);
            mDiv.scrollTop = mDiv.scrollHeight;
        }

        function draw(m) {
            const mDiv = document.getElementById('messages');
            const isMe = m.user_id === user.id;
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'sent' : 'received'} ${chatType === 'ai' && !isMe ? 'ai' : ''}`;
            div.innerHTML = `<small style="opacity:0.5; font-size:0.6rem">${m.user_email.split('@')[0]}</small><br>${m.text}`;
            mDiv.appendChild(div);
            mDiv.scrollTop = mDiv.scrollHeight;
        }

        async function send() {
            const inp = document.getElementById('msgInput');
            const val = inp.value.trim();
            if (!val) return;

            const msgData = {
                text: val,
                user_id: user.id,
                user_email: user.email,
                chat_type: chatType,
                receiver_id: (chatType === 'private' ? activeChat : null)
            };

            await sb.from('messages').insert([msgData]);
            inp.value = '';

            if (chatType === 'ai') {
                setTimeout(() => {
                    sb.from('messages').insert([{
                        text: "Я получил ваше сообщение и обрабатываю его. Как ваш персональный Senpixel AI, я всегда на связи!",
                        user_id: '00000000-0000-0000-0000-000000000000',
                        user_email: 'Senpixel_AI',
                        chat_type: 'ai',
                        receiver_id: user.id
                    }]);
                }, 1000);
            }
        }

        function subscribe() {
            sb.channel('apex').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => loadMsgs()).subscribe();
        }

        function toggleSet() { document.getElementById('settings').classList.toggle('open'); }
        function applyColor(c) { document.documentElement.style.setProperty('--accent', c); }
        
        init();
    </script>
</body>
</html>
