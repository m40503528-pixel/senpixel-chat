<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Senpixel Nexus // Evolution 6.0</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --n: #00ffa2; --b: #00e5ff; --bg: #030508; --g: rgba(0, 255, 162, 0.15); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; }
        
        /* Background Эффект: Нейронная сетка */
        .bg-grid {
            position: fixed; inset: 0; z-index: -1;
            background-image: linear-gradient(var(--g) 1px, transparent 1px), linear-gradient(90deg, var(--g) 1px, transparent 1px);
            background-size: 50px 50px; animation: move 20s linear infinite; opacity: 0.3;
        }
        @keyframes move { from { background-position: 0 0; } to { background-position: 50px 50px; } }

        /* Auth */
        #gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: 1s; }
        .card { background: rgba(10,15,25,0.9); padding: 40px; border: 1px solid var(--n); border-radius: 20px; text-align: center; width: 340px; backdrop-filter: blur(20px); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--g); color: #fff; border-radius: 8px; outline: none; }
        button { width: 100%; padding: 12px; background: var(--n); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* Main App */
        #nexus { display: none; width: 100%; height: 100%; flex-direction: row; }
        .side { width: 80px; background: rgba(0,0,0,0.8); border-right: 1px solid var(--g); display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        .nav-ico { font-size: 24px; margin-bottom: 30px; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .nav-ico.active { opacity: 1; color: var(--n); filter: drop-shadow(0 0 5px var(--n)); }

        .view-port { flex: 1; display: flex; flex-direction: column; background: rgba(5,8,15,0.6); }
        .screen { display: none; flex: 1; flex-direction: column; padding: 20px; }
        .screen.active { display: flex; }

        /* Chat UI */
        #msgs { flex: 1; overflow-y: auto; padding-right: 10px; display: flex; flex-direction: column; gap: 15px; }
        .bubble { max-width: 75%; padding: 12px 18px; border-radius: 18px; position: relative; font-size: 14px; animation: pop 0.3s ease; }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } }
        .bubble.me { align-self: flex-end; background: var(--n); color: #000; border-bottom-right-radius: 2px; }
        .bubble.not-me { align-self: flex-start; background: rgba(255,255,255,0.05); border: 1px solid var(--g); border-bottom-left-radius: 2px; }

        .input-wrap { display: flex; gap: 10px; padding: 20px; background: rgba(0,0,0,0.4); border-top: 1px solid var(--g); }
        textarea { flex: 1; background: #000; border: 1px solid var(--g); color: #fff; padding: 12px; border-radius: 10px; resize: none; outline: none; }

        /* AI Monitor */
        .ai-log { font-family: monospace; font-size: 12px; color: var(--b); background: #000; padding: 15px; border-radius: 10px; border: 1px solid var(--b); margin-top: 20px; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <div id="gate">
        <div class="card">
            <h1 style="color:var(--n); letter-spacing: 5px;">NEXUS</h1>
            <input type="email" id="u-email" placeholder="Email">
            <input type="password" id="u-pass" placeholder="Password">
            <button id="auth-btn">INITIALIZE</button>
            <div id="auth-err" style="color:red; font-size:10px; margin-top:10px;"></div>
        </div>
    </div>

    <div id="nexus">
        <div class="side">
            <div class="nav-ico active" data-s="s-chat">💬</div>
            <div class="nav-ico" data-s="s-ai">🤖</div>
            <div class="nav-ico" data-s="s-set">⚙️</div>
        </div>
        <div class="view-port">
            <div id="s-chat" class="screen active">
                <div id="msgs"></div>
                <div class="input-wrap">
                    <textarea id="minput" rows="1" placeholder="Type packet..."></textarea>
                    <button id="send-btn" style="width: 80px;">SEND</button>
                </div>
            </div>
            <div id="s-ai" class="screen">
                <h2>AI Sentinel Node</h2>
                <div class="ai-log" id="ailog">> Core Health: 100%<br>> Encryption: Double Ratchet Active</div>
                <button id="heal-btn" style="margin-top: 10px;">SELF-REPAIR CODE</button>
            </div>
            <div id="s-set" class="screen">
                <h2>System Config</h2>
                <button id="out-btn" style="background:#ff3333; margin-top:20px;">DISCONNECT</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
