<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senpixel Hyper-Messenger</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent: #3ecf8e;
            --bg-deep: #05070a;
            --panel: rgba(17, 24, 39, 0.7);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f3f4f6;
            --text-dim: #9ca3af;
        }

        * { box-sizing: border-box; transition: background 0.3s, transform 0.2s; }
        body, html { margin: 0; padding: 0; height: 100vh; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg-deep); color: var(--text-main); overflow: hidden; }

        /* Живой анимированный фон (Сетка и градиент) */
        #bg-canvas { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #111827 0%, #05070a 100%); }
        .grid { position: absolute; width: 200%; height: 200%; background-image: linear-gradient(var(--glass-border) 1px, transparent 1px), linear-gradient(90deg, var(--glass-border) 1px, transparent 1px); background-size: 50px 50px; transform: perspective(500px) rotateX(60deg); bottom: -50%; left: -50%; animation: gridMove 20s linear infinite; opacity: 0.2; }
        @keyframes gridMove { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(50px); } }

        #app { display: flex; height: 100vh; backdrop-filter: blur(20px); border: 1px solid var(--glass-border); }

        /* Sidebar - Список чатов */
        .sidebar { width: 350px; background: var(--panel); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid var(--glass-border); }
        .search-bar { background: var(--bg-deep); border-radius: 12px; display: flex; align-items: center; padding: 10px 15px; border: 1px solid var(--glass-border); }
        .search-bar input { background: none; border: none; color: white; margin-left: 10px; outline: none; width: 100%; }

        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; border-bottom: 1px solid var(--glass); }
        .chat-item:hover { background: var(--glass); }
        .chat-item.active { background: rgba(62, 207, 142, 0.1); border-left: 4px solid var(--accent); }
        .avatar { width: 45px; height: 45px; border-radius: 14px; background: linear-gradient(45deg, #1f2937, #374151); display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid var(--glass-border); }

        /* Main Chat Area */
        .main { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.2); }
        .chat-header { padding: 15px 25px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); }

        #messages { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Message Styling */
        .msg { max-width: 65%; padding: 14px 18px; border-radius: 18px; position: relative; animation: msgShow 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .msg.sent { align-self: flex-end; background: var(--accent); color: #05070a; border-bottom-right-radius: 4px; font-weight: 500; }
        .msg.received { align-self: flex-start; background: var(--panel); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; }
        .msg.official { align-self: center; background: linear-gradient(90deg, #111, #222); border: 1px solid var(--accent); color: var(--accent); text-align: center; width: 80%; }
        
        @keyframes msgShow { from { opacity: 0; transform: translateY(10px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* Input Area */
        .input-bar { padding: 25px; background: var(--panel); display: flex; gap: 15px; align-items: center; border-top: 1px solid var(--glass-border); }
        .input-bar input { flex: 1; padding: 15px 25px; border-radius: 15px; border: 1px solid var(--glass-border); background: var(--bg-deep); color: white; font-size: 1rem; }
        .action-btn { width: 50px; height: 50px; border-radius: 15px; border: none; background: var(--accent); color: #000; cursor: pointer; font-size: 1.2rem; }

        /* Customization Sidebar */
        #settings { position: fixed; right: -350px; top: 0; bottom: 0; width: 350px; background: var(--panel); backdrop-filter: blur(40px); border-left: 1px solid var(--glass-border); padding: 30px; transition: 0.4s; z-index: 2000; }
        #settings.open { right: 0; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="bg-canvas"><div class="grid"></div></div>

    <div id="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass" style="color: var(--text-dim)"></i>
                    <input type="text" id="userSearch" placeholder="Поиск людей или сообщений..." oninput="search()">
                </div>
            </div>
            <div class="chat-list" id="chats">
                <div class="chat-item active" onclick="selectChat(null, 'Общий канал', 'O')">
                    <div class="avatar" style="color: var(--accent)">#</div>
                    <div style="flex: 1">
                        <div style="font-weight: bold;">Общий канал</div>
                        <div style="font-size: 0.8rem; color: var(--text-dim);">Все пользователи системы</div>
                    </div>
                </div>
                <div id="private-chats"></div>
            </div>
            <div style="padding: 20px;">
                <button onclick="toggleSet()" style="width: 100%; padding: 12px; background: var(--glass); border: 1px solid var(--glass-border); color: white; border-radius: 10px; cursor: pointer;">
                    <i class="fa-solid fa-sliders"></i> Настройки интерфейса
                </button>
            </div>
        </aside>

        <main class="main">
            <div class="chat-header">
                <div>
                    <h3 id="chat-title" style="margin: 0;">Общий канал</h3>
                    <small id="chat-status" style="color: var(--accent)">online</small>
                </div>
                <div style="display: flex; gap: 15px;">
                    <i class="fa-solid fa-robot" onclick="aiAsk()" style="cursor: pointer; color: var(--accent)"></i>
                    <i class="fa-solid fa-right-from-bracket" onclick="logout()" style="cursor: pointer; color: #ff4d4d"></i>
                </div>
            </div>

            <div id="messages"></div>

            <div id="typing-area" style="padding: 0 30px; font-size: 0.75rem; color: var(--accent); height: 20px; opacity: 0;">Печатает...</div>

            <div class="input-bar">
                <button class="action-btn" style="background: var(--glass); color: white;"><i class="fa-solid fa-paperclip"></i></button>
                <input type="text" id="msgInput" placeholder="Ваше сообщение..." oninput="handleTyping()" onkeypress="if(event.key==='Enter') send()">
                <button class="action-btn" onclick="send()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </main>
    </div>

    <div id="settings">
        <h2>Настройки</h2>
        <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 20px 0;">
        <label>Основной акцент:</label><br>
        <input type="color" id="accentColor" value="#3ecf8e" onchange="changeColor(this.value)" style="width: 100%; height: 40px; border: none; background: none; cursor: pointer;"><br><br>
        
        <label>Яркость сетки фона:</label><br>
        <input type="range" min="0" max="100" value="20" oninput="document.querySelector('.grid').style.opacity = this.value/100" style="width: 100%;"><br><br>
        
        <button onclick="toggleSet()" style="width: 100%; padding: 12px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">Сохранить изменения</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://kwotdvdjxhpttuwhgjkh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_i6HL03F98ZmxCKmAKQDaLQ_w6u7ep4d';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let user = null;
        let activeChat = null;
        let typeTimeout;

        async function init() {
            const { data } = await sb.auth.getSession();
            if (!data.session) {
                await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
            } else {
                user = data.session.user;
                loadChats();
                loadMsgs();
                subscribe();
            }
        }

        // --- ЛОГИКА ЧАТОВ ---
        async function loadChats() {
            const { data } = await sb.from('messages').select('user_id, user_email').neq('user_id', user.id);
            const unique = [...new Map(data.map(item => [item['user_id'], item])).values()];
            const cont = document.getElementById('private-chats');
            cont.innerHTML = unique.map(u => `
                <div class="chat-item" onclick="selectChat('${u.user_id}', '${u.user_email.split('@')[0]}', '${u.user_email[0].toUpperCase()}')">
                    <div class="avatar">${u.user_email[0].toUpperCase()}</div>
                    <div style="flex: 1">
                        <div style="font-weight: bold;">${u.user_email.split('@')[0]}</div>
                        <div style="font-size: 0.8rem; color: var(--text-dim);">Написать личное сообщение</div>
                    </div>
                </div>
            `).join('');
        }

        function selectChat(id, title, letter) {
            activeChat = id;
            document.getElementById('chat-title').innerText = title;
            document.querySelectorAll('.chat-item').forEach(e => e.classList.remove('active'));
            event.currentTarget.classList.add('active');
            loadMsgs();
        }

        async function loadMsgs() {
            let q = sb.from('messages').select('*').order('created_at', { ascending: true });
            if (activeChat) {
                q = q.or(`and(user_id.eq.${user.id},receiver_id.eq.${activeChat}),and(user_id.eq.${activeChat},receiver_id.eq.${user.id})`);
            } else {
                q = q.is('receiver_id', null);
            }
            const { data } = await q;
            const mDiv = document.getElementById('messages');
            mDiv.innerHTML = '';
            if (data) data.forEach(renderMsg);
            mDiv.scrollTop = mDiv.scrollHeight;
        }

        function renderMsg(m) {
            const mDiv = document.getElementById('messages');
            const isMe = m.user_id === user.id;
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'sent' : 'received'} ${m.is_official ? 'official' : ''}`;
            div.innerHTML = `
                <div style="font-size: 0.65rem; opacity: 0.6; margin-bottom: 4px;">${m.user_email.split('@')[0]}</div>
                <div>${m.text}</div>
            `;
            mDiv.appendChild(div);
            mDiv.scrollTop = mDiv.scrollHeight;
        }

        async function send() {
            const inp = document.getElementById('msgInput');
            if (!inp.value.trim()) return;
            await sb.from('messages').insert([{
                text: inp.value,
                user_id: user.id,
                user_email: user.email,
                receiver_id: activeChat
            }]);
            inp.value = '';
            sb.from('typing_status').upsert({ user_id: user.id, is_typing: false });
        }

        // --- REALTIME & TYPING ---
        function handleTyping() {
            sb.from('typing_status').upsert({ user_id: user.id, user_email: user.email, is_typing: true, target_id: activeChat });
            clearTimeout(typeTimeout);
            typeTimeout = setTimeout(() => sb.from('typing_status').upsert({ user_id: user.id, is_typing: false }), 2000);
        }

        function subscribe() {
            sb.channel('main').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, payload => {
                const m = payload.new;
                if ((activeChat === null && m.receiver_id === null) || (activeChat === m.user_id) || (m.user_id === user.id)) {
                    loadMsgs();
                }
            })
            .on('postgres_changes', { event: '*', schema: 'public', table: 'typing_status' }, payload => {
                const t = document.getElementById('typing-area');
                if (payload.new.user_id !== user.id && payload.new.is_typing) {
                    t.innerText = payload.new.user_email.split('@')[0] + ' печатает...';
                    t.style.opacity = 1;
                } else { t.style.opacity = 0; }
            }).subscribe();
        }

        // --- UI & AI ---
        function toggleSet() { document.getElementById('settings').classList.toggle('open'); }
        function changeColor(c) { document.documentElement.style.setProperty('--accent', c); }
        function aiAsk() { renderMsg({ user_email: 'Senpixel_AI', text: 'Я анализирую ваши данные... Чем могу помочь сегодня?', is_official: true }); }
        async function logout() { await sb.auth.signOut(); window.location.reload(); }

        init();
    </script>
</body>
</html>
