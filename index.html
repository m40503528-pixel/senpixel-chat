<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Senpixel Apex v4.0 | Enterprise Security</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tweetnacl/1.0.3/nacl-fast.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tweetnacl-util/0.15.0/nacl-util.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #3ecf8e; --bg: #0b0e11; --panel: #15191e; --glass: rgba(255,255,255,0.05); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .nav { width: 70px; background: #000; display: flex; flex-direction: column; align-items: center; padding: 20px 0; border-right: 1px solid var(--glass); gap: 20px; }
        .nav-btn { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #444; transition: 0.3s; }
        .nav-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 15px rgba(62, 207, 142, 0.4); }
        .sidebar { width: 300px; background: var(--panel); border-right: 1px solid var(--glass); }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at top right, #1a222c, #0b0e11); }
        #messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 70%; padding: 12px 16px; border-radius: 18px; position: relative; font-size: 0.95rem; }
        .msg.me { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: #232a33; border-bottom-left-radius: 4px; }
        .input-bar { padding: 20px; background: var(--panel); display: flex; gap: 12px; }
        input { flex: 1; background: #000; border: 1px solid var(--glass); padding: 14px; border-radius: 12px; color: #fff; outline: none; }
        button#send { background: var(--accent); border: none; width: 50px; border-radius: 12px; cursor: pointer; }
        #auth-gate { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
    </style>
</head>
<body>

<div id="auth-gate">
    <h1 style="color: var(--accent); letter-spacing: 5px;">SENPIXEL</h1>
    <button onclick="login()" style="padding: 15px 30px; border-radius: 10px; border: none; background: var(--accent); font-weight: bold; cursor: pointer;">Вход через Google</button>
</div>

<nav class="nav">
    <div class="nav-btn active"><i class="fa-solid fa-message"></i></div>
    <div style="flex:1"></div>
    <div class="nav-btn" onclick="logout()"><i class="fa-solid fa-sign-out-alt"></i></div>
</nav>

<aside class="sidebar">
    <div style="padding: 20px;"><h3>Чаты</h3></div>
    <div id="users-list"></div>
</aside>

<main class="chat-area">
    <header style="padding: 15px 25px; border-bottom: 1px solid var(--glass); display: flex; justify-content: space-between; align-items: center;">
        <div><b>Global Chat</b><br><small id="e2ee-status" style="opacity:0.5">E2EE: Выключено</small></div>
        <button onclick="toggleE2EE()" id="e2ee-toggle" style="background: none; border: 1px solid var(--glass); color: #fff; padding: 6px 12px; border-radius: 8px; cursor: pointer;">Шифрование</button>
    </header>
    <div id="messages"></div>
    <div class="input-bar">
        <input type="text" id="msgInput" placeholder="Введите сообщение...">
        <button id="send"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
</main>

<script>
    const sb = supabase.createClient('ТВОЙ_URL', 'ТВОЙ_KEY');
    
    let user = null;
    let isE2EE = false;
    let ACTIVE_CHAT_ID = '00000000-0000-0000-0000-000000000000';
    const renderedMessages = new Set();
    const sharedSecrets = new Map();

    const UI = {
        msgs: document.getElementById('messages'),
        input: document.getElementById('msgInput'),
        send: document.getElementById('send'),
        gate: document.getElementById('auth-gate')
    };

    // --- CRYPTO CORE ---
    const Crypto = {
        async init(user) {
            let priv = localStorage.getItem('private_key');
            if (!priv) {
                const pair = nacl.box.keyPair();
                priv = nacl.util.encodeBase64(pair.secretKey);
                localStorage.setItem('private_key', priv);
                await sb.from('user_keys').upsert({ user_id: user.id, public_key: nacl.util.encodeBase64(pair.publicKey) });
            }
        },
        encrypt(text, key) {
            const nonce = nacl.randomBytes(24);
            const box = nacl.box.after(nacl.util.decodeUTF8(text), nonce, nacl.util.decodeBase64(key));
            return JSON.stringify({ n: Array.from(nonce), b: Array.from(box) });
        },
        decrypt(payload, key) {
            try {
                const data = JSON.parse(payload);
                const opened = nacl.box.open.after(new Uint8Array(data.b), new Uint8Array(data.n), nacl.util.decodeBase64(key));
                return opened ? nacl.util.encodeUTF8(opened) : "[Ошибка]";
            } catch { return "[Ошибка данных]"; }
        }
    };

    // --- APP LOGIC ---
    async function init() {
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
            user = session.user;
            UI.gate.style.display = 'none';
            await Crypto.init(user);
            loadMessages();
            subscribe();
        }
    }

    async function loadMessages() {
        const { data } = await sb.from('messages').select('*').eq('chat_id', ACTIVE_CHAT_ID).order('created_at');
        UI.msgs.innerHTML = '';
        data?.forEach(appendMessage);
    }

    function appendMessage(m) {
        if (renderedMessages.has(m.id)) return;
        renderedMessages.add(m.id);

        const isMe = m.user_id === user?.id;
        const div = document.createElement('div');
        div.className = `msg ${isMe ? 'me' : 'them'}`;

        const textNode = document.createElement('div');
        if (m.is_encrypted) {
            // FIX XSS: Твой метод replaceChildren
            const icon = document.createElement('i'); icon.className = 'fa-solid fa-shield-halved';
            const span = document.createElement('span'); 
            span.textContent = ' ' + (isMe ? "[Зашифровано]" : "[Шифрованный входящий]");
            textNode.replaceChildren(icon, span);
        } else {
            textNode.textContent = m.text; // FIX XSS
        }

        div.append(textNode);
        UI.msgs.append(div);
        UI.msgs.scrollTop = UI.msgs.scrollHeight;
    }

    async function send() {
        const val = UI.input.value.trim();
        if (!val || !user) return;

        UI.input.value = '';
        await sb.from('messages').insert([{
            text: isE2EE ? Crypto.encrypt(val, localStorage.getItem('chat_key') || 'dummy') : val,
            user_id: user.id,
            chat_id: ACTIVE_CHAT_ID,
            user_email: user.email,
            is_encrypted: isE2EE
        }]);
    }

    function subscribe() {
        sb.channel('live').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `chat_id=eq.${ACTIVE_CHAT_ID}` }, 
        p => appendMessage(p.new)).subscribe();
    }

    function toggleE2EE() {
        isE2EE = !isE2EE;
        document.getElementById('e2ee-status').textContent = `E2EE: ${isE2EE ? 'АКТИВНО' : 'Выкл'}`;
    }

    async function login() { await sb.auth.signInWithOAuth({ provider: 'google' }); }
    async function logout() { await sb.auth.signOut(); location.reload(); }

    UI.send.onclick = send;
    UI.input.onkeydown = e => e.key === 'Enter' && send();

    init();
</script>
</body>
</html>
