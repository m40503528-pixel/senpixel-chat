<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senpixel Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f0f0f; 
            color: #e0e0e0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
        }
        
        /* Контейнеры экранов */
        #auth-container, #chat-container { 
            display: none; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100%; 
            padding: 20px; 
        }

        /* Поля ввода и кнопки */
        input { 
            padding: 14px; 
            margin: 8px 0; 
            border-radius: 10px; 
            border: 1px solid #333; 
            background: #1a1a1a; 
            color: white; 
            width: 100%; 
            max-width: 320px; 
        }
        button { 
            padding: 14px; 
            margin: 8px 0; 
            border-radius: 10px; 
            border: none; 
            background: #3ecf8e; 
            color: #000; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            max-width: 320px; 
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }

        /* Кнопка Google */
        .google-btn { 
            background: white; 
            color: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
        }

        /* Чат */
        #messages { 
            flex: 1; 
            overflow-y: auto; 
            width: 100%; 
            max-width: 700px; 
            margin: 20px 0; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            padding: 10px;
        }
        .msg { 
            background: #1e1e1e; 
            padding: 12px 16px; 
            border-radius: 15px; 
            align-self: flex-start; 
            max-width: 85%; 
            word-wrap: break-word;
        }
        .my-msg { background: #3ecf8e; color: #000; align-self: flex-end; }
        .user-email { font-size: 0.75em; opacity: 0.6; margin-bottom: 4px; font-weight: bold; }

        .input-area { 
            display: flex; 
            gap: 10px; 
            width: 100%; 
            max-width: 700px; 
            background: #1a1a1a; 
            padding: 10px; 
            border-radius: 15px; 
            margin-bottom: 20px;
        }
        .input-area input { margin: 0; max-width: none; flex: 1; border: none; }
        .input-area button { margin: 0; width: 80px; }
    </style>
</head>
<body>

    <div id="auth-container">
        <h1 style="color: #3ecf8e; margin-bottom: 30px;">Senpixel Chat</h1>
        <input type="email" id="email" placeholder="Ваш Email">
        <input type="password" id="password" placeholder="Пароль">
        <button onclick="handleAuth('login')">Войти</button>
        <button onclick="handleAuth('signup')" style="background: #2b2b2b; color: #fff;">Создать аккаунт</button>
        
        <div style="margin: 20px 0; color: #555;">или</div>

        <button class="google-btn" onclick="signInWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Войти через Google
        </button>
    </div>

    <div id="chat-container">
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 700px; border-bottom: 1px solid #333; padding: 10px;">
            <div id="user-info" style="font-weight: bold; color: #3ecf8e;"></div>
            <button onclick="logout()" style="width: auto; padding: 8px 15px; background: #ff4444; color: white; font-size: 0.8em;">Выйти</button>
        </div>

        <div id="messages"></div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <script>
        // ДАННЫЕ ТВОЕГО ПРОЕКТА
        const SUPABASE_URL = "https://kwotdvdjxhpttuwhgjkh.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_i6HL03F98ZmxCKmAKQDaLQ_w6u7ep4d"; 

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const authContainer = document.getElementById('auth-container');
        const chatContainer = document.getElementById('chat-container');
        const messagesDiv = document.getElementById('messages');
        const msgInput = document.getElementById('messageInput');

        // Проверка авторизации
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                authContainer.style.display = 'none';
                chatContainer.style.display = 'flex';
                document.getElementById('user-info').innerText = session.user.email;
                loadMessages();
                subscribeMessages();
            } else {
                authContainer.style.display = 'flex';
                chatContainer.style.display = 'none';
                messagesDiv.innerHTML = '';
            }
        });

        // Вход через Google
        async function signInWithGoogle() {
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + window.location.pathname
                }
            });
            if (error) alert("Ошибка: " + error.message);
        }

        // Обычная почта
        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) return alert("Заполните поля!");

            let result = (type === 'signup') 
                ? await supabaseClient.auth.signUp({ email, password })
                : await supabaseClient.auth.signInWithPassword({ email, password });

            if (result.error) alert(result.error.message);
            else if (type === 'signup') alert("Проверьте почту (если не включен Google)!");
        }

        async function logout() { await supabaseClient.auth.signOut(); }

        // Сообщения
        async function loadMessages() {
            const { data, error } = await supabaseClient
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true });
            
            if (!error) {
                messagesDiv.innerHTML = '';
                data.forEach(renderMessage);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        }

        async function renderMessage(msg) {
            const { data } = await supabaseClient.auth.getUser();
            const isMe = data.user && data.user.id === msg.user_id;
            
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'my-msg' : ''}`;
            div.innerHTML = `
                <div class="user-email">${msg.email || 'Аноним'}</div>
                <div>${msg.text}</div>
            `;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;

            const { data: { user } } = await supabaseClient.auth.getUser();
            const { error } = await supabaseClient.from('messages').insert([{ 
                text: text, 
                user_id: user.id,
                email: user.email 
            }]);

            if (error) alert("Ошибка: " + error.message);
            msgInput.value = '';
        }

        function subscribeMessages() {
            supabaseClient
                .channel('public:messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    renderMessage(payload.new);
                })
                .subscribe();
        }
    </script>
</body>
</html>
