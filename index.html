<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Senpixel Nexus // Professional Edition</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00ffa2; --blue: #00e5ff; --bg: #0a0c10; 
            --glass: rgba(16, 20, 28, 0.95); --border: rgba(0, 255, 162, 0.15); 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

        body { background: var(--bg); color: #e1e4e8; height: 100vh; display: flex; overflow: hidden; }

        /* Auth Gate */
        #gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .auth-card { background: var(--glass); padding: 40px; border: 1px solid var(--border); border-radius: 12px; width: 360px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #050608; border: 1px solid var(--border); color: #fff; border-radius: 6px; outline: none; }
        .btn-prime { width: 100%; padding: 12px; background: var(--neon); color: #000; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; margin-top: 10px; }

        /* Layout */
        #app { display: none; width: 100%; height: 100%; flex-direction: row; }
        
        .nav-bar { width: 72px; background: #0d1117; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 25px; }
        .nav-item { font-size: 20px; cursor: pointer; opacity: 0.4; transition: 0.2s; }
        .nav-item.active { opacity: 1; color: var(--neon); }

        .main-frame { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at top right, #111827, #0a0c10); }
        .top-bar { height: 48px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; font-family: monospace; font-size: 11px; color: var(--blue); }

        .view { display: none; flex: 1; flex-direction: column; padding: 24px; overflow: hidden; }
        .view.active { display: flex; }

        /* Chat Components */
        #chat-scroller { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px; }
        .bubble { max-width: 70%; padding: 10px 16px; border-radius: 14px; font-size: 14px; line-height: 1.5; position: relative; }
        .bubble.me { align-self: flex-end; background: var(--neon); color: #000; border-bottom-right-radius: 2px; }
        .bubble.peer { align-self: flex-start; background: #1f2937; border: 1px solid var(--border); border-bottom-left-radius: 2px; }

        .input-panel { padding: 20px; display: flex; gap: 12px; background: rgba(0,0,0,0.2); border-top: 1px solid var(--border); }
        textarea { flex: 1; background: #0d1117; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; resize: none; outline: none; height: 44px; }

        /* Evolution Console */
        .console { background: #000; padding: 15px; border-radius: 8px; border: 1px solid var(--blue); font-family: 'Courier New', monospace; font-size: 12px; color: var(--blue); flex: 1; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="gate">
        <div class="auth-card">
            <h2 style="margin-bottom: 24px; letter-spacing: 2px;">SENPIXEL_CORE</h2>
            <input type="email" id="auth-email" placeholder="Identity (Email)">
            <input type="password" id="auth-pass" placeholder="Secret Key">
            <button class="btn-prime" id="auth-exec">INITIALIZE SESSION</button>
            <p id="auth-log" style="color: #ff4444; font-size: 10px; margin-top: 12px;"></p>
        </div>
    </div>

    <div id="app">
        <nav class="nav-bar">
            <div class="nav-item active" data-tab="tab-chat">💬</div>
            <div class="nav-item" data-tab="tab-ai">🤖</div>
            <div class="nav-item" data-tab="tab-sys">⚙️</div>
        </nav>

        <main class="main-frame">
            <header class="top-bar" id="sentinel-status">> SENTINEL_ENCLAVE: ACTIVE // NO_THREATS_DETECTED</header>

            <section id="tab-chat" class="view active">
                <div id="chat-scroller"></div>
                <div class="input-panel">
                    <textarea id="msg-input" placeholder="Secure transmission..."></textarea>
                    <button class="btn-prime" id="msg-send" style="width: 80px; margin: 0;">SEND</button>
                </div>
            </section>

            <section id="tab-ai" class="view">
                <h3 style="margin-bottom: 15px;">AI Evolution Engine</h3>
                <div class="console" id="ai-console">> Nexus Heuristics: Online...</div>
                <button class="btn-prime" id="ai-patch" style="margin-top: 15px; background: var(--blue);">RUN DYNAMIC PATCHING</button>
            </section>

            <section id="tab-sys" class="view">
                <h3 style="margin-bottom: 15px;">System Configuration</h3>
                <div id="sys-info" style="font-size: 12px; margin-bottom: 20px;"></div>
                <button class="btn-prime" id="sys-out" style="background: #ff4444;">TERMINATE ALL CONNECTIONS</button>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
