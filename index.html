<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Senpixel — Messenger Pro</title>
    
    <!-- Подключение библиотек -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #080a0c;
            --bg-panel: #101419;
            --bg-input: #1a1e26;
            --accent: #ff3333;
            --accent-dim: #991a1a;
            --text-main: #c4ced4;
            --text-dim: #7f91a4;
            --border-color: #242f3d;
            --glass: rgba(16, 20, 25, 0.9);
            --radius: 4px;
            --font-main: 'Oxanium', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: var(--font-main);
            background: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        /* --- Splash Screen --- */
        #splash {
            position: fixed; inset: 0; background: var(--bg-deep);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        .splash-logo {
            font-size: 2.5rem; font-weight: 700; color: var(--accent);
            margin-bottom: 20px; text-shadow: 0 0 15px var(--accent-dim);
            letter-spacing: 5px;
        }
        .loader {
            width: 30px; height: 30px; border: 2px solid var(--accent-dim);
            border-top: 2px solid var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- App Layout --- */
        #app { display: none; width: 100%; height: 100%; }

        /* --- Sidebar --- */
        .sidebar {
            width: 340px; background: var(--bg-panel);
            display: flex; flex-direction: column; border-right: 1px solid var(--border-color);
        }
        .sidebar-header { padding: 25px 20px; }
        .search-box { position: relative; }
        .search-box input {
            width: 100%; padding: 12px 15px 12px 40px; border-radius: var(--radius);
            border: 1px solid var(--border-color); background: var(--bg-input);
            color: white; outline: none; font-family: inherit; transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(255,51,51,0.1); }
        .search-icon { position: absolute; left: 15px; top: 14px; color: var(--text-dim); }

        .nav-tabs {
            display: flex; gap: 10px; padding: 0 20px 20px;
        }
        .nav-tab {
            flex: 1; background: var(--bg-input); border: 1px solid var(--border-color);
            color: var(--text-dim); cursor: pointer; padding: 10px;
            border-radius: var(--radius); transition: 0.3s; font-family: inherit;
        }
        .nav-tab.active { color: var(--accent); border-color: var(--accent); background: rgba(255,51,51,0.05); }

        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item {
            padding: 15px 20px; display: flex; align-items: center; gap: 15px;
            cursor: pointer; transition: 0.2s; border-left: 3px solid transparent;
        }
        .chat-item:hover { background: rgba(255,255,255,0.02); }
        .chat-item.active { background: rgba(255,51,51,0.05); border-left-color: var(--accent); }

        .avatar {
            width: 48px; height: 48px; border-radius: var(--radius);
            background: var(--bg-input); border: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: var(--accent); flex-shrink: 0; position: relative;
        }
        .avatar.online::after {
            content: ''; position: absolute; bottom: -2px; right: -2px;
            width: 10px; height: 10px; background: #33ff33; border: 2px solid var(--bg-panel); border-radius: 50%;
        }

        /* --- Main Content --- */
        .main-content { flex: 1; display: flex; flex-direction: column; background: var(--bg-deep); }
        .view-container { display: none; flex-direction: column; height: 100%; width: 100%; }
        .view-container.active { display: flex; }

        /* --- Chat UI --- */
        .chat-header {
            height: 70px; padding: 0 25px; background: var(--glass);
            display: flex; align-items: center; border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(10px); z-index: 10;
        }
        .messages {
            flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 10px;
            background-image: radial-gradient(var(--border-color) 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }
        .message {
            max-width: 70%; padding: 12px 16px; border-radius: var(--radius);
            font-size: 0.95rem; line-height: 1.4; position: relative;
            animation: m-fade 0.3s ease;
        }
        @keyframes m-fade { from { opacity: 0; transform: translateY(10px); } }

        .message.own { align-self: flex-end; background: var(--bg-input); border: 1px solid #333; border-right: 3px solid var(--accent); }
        .message.other { align-self: flex-start; background: var(--bg-panel); border: 1px solid var(--border-color); }

        .input-area {
            padding: 20px; background: var(--bg-panel); display: flex; align-items: flex-end; gap: 15px;
            border-top: 1px solid var(--border-color);
        }
        .input-area textarea {
            flex: 1; background: var(--bg-input); border: 1px solid var(--border-color);
            border-radius: var(--radius); padding: 12px; color: white; resize: none;
            outline: none; max-height: 150px; font-family: inherit; transition: border 0.3s;
        }
        .input-area textarea:focus { border-color: var(--accent); }
        .send-btn { color: var(--accent); background: none; border: none; font-size: 1.4rem; cursor: pointer; opacity: 0.8; transition: 0.2s; }
        .send-btn:hover { opacity: 1; transform: scale(1.1); }

        /* --- AI & Settings --- */
        .generic-view { padding: 40px; max-width: 800px; margin: 0 auto; width: 100%; }
        .card { background: var(--bg-panel); padding: 25px; border-radius: var(--radius); border: 1px solid var(--border-color); margin-top: 20px; }
        .btn-main {
            width: 100%; padding: 15px; background: transparent; color: var(--accent);
            border: 1px solid var(--accent); border-radius: var(--radius); font-weight: bold;
            cursor: pointer; text-transform: uppercase; transition: 0.3s; font-family: inherit;
        }
        .btn-main:hover { background: var(--accent); color: white; box-shadow: 0 0 20px var(--accent-dim); }

        /* --- Auth Modal --- */
        #authModal {
            position: fixed; inset: 0; background: var(--bg-deep);
            display: flex; align-items: center; justify-content: center; z-index: 10000;
        }
        .auth-card { background: var(--bg-panel); padding: 40px; border-radius: var(--radius); border: 1px solid var(--border-color); width: 100%; max-width: 400px; }
        .auth-card input { width: 100%; padding: 15px; margin-bottom: 15px; background: var(--bg-input); border: 1px solid var(--border-color); color: white; border-radius: var(--radius); outline: none; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent-dim); }
    </style>
</head>
<body>

<div id="splash">
    <div class="splash-logo">SENPIXEL</div>
    <div class="loader"></div>
</div>

<div id="authModal" style="display: none;">
    <div class="auth-card">
        <h2 style="color: var(--accent); margin-bottom: 25px; text-align: center;">// AUTH_REQUIRED</h2>
        <input type="email" id="email" placeholder="Terminal ID (Email)">
        <input type="password" id="password" placeholder="Access Code (Password)">
        <button class="btn-main" id="loginBtn">Initialize</button>
        <p id="authError" style="color: var(--accent); font-size: 0.8rem; margin-top: 15px; text-align: center;"></p>
    </div>
</div>

<div id="app">
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" placeholder="Search Channels...">
            </div>
        </div>
        <div class="nav-tabs">
            <button class="nav-tab active" data-target="view-chats"><i class="fas fa-terminal"></i></button>
            <button class="nav-tab" data-target="view-ai"><i class="fas fa-brain"></i></button>
            <button class="nav-tab" data-target="view-settings"><i class="fas fa-cog"></i></button>
        </div>
        <div class="chat-list" id="chatList"></div>
    </div>

    <div class="main-content">
        <!-- Chats View -->
        <div id="view-chats" class="view-container active">
            <div class="chat-header" id="chatHeader" style="display:none;">
                <div class="avatar online" id="activeAvatar">?</div>
                <div style="margin-left: 15px;">
                    <strong id="activeChatName" style="display:block;">Secure Channel</strong>
                    <small style="color: #33ff33; font-size: 0.7rem;">// ENCRYPTED_STATUS: OK</small>
                </div>
            </div>
            <div class="messages" id="messages">
                <div style="margin: auto; opacity: 0.2; text-align: center;">
                    <i class="fas fa-shield-alt" style="font-size: 5rem; margin-bottom: 20px;"></i>
                    <p>Select a secure line to begin.</p>
                </div>
            </div>
            <div class="input-area" id="inputArea" style="display:none;">
                <textarea id="msgInput" rows="1" placeholder="Type a message..."></textarea>
                <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <!-- AI View -->
        <div id="view-ai" class="view-container">
            <div class="generic-view">
                <h2>🤖 AI_ASSISTANT</h2>
                <div class="card">
                    <textarea id="aiPrompt" style="width:100%; height:100px; background:var(--bg-input); border:1px solid var(--border-color); color:white; padding:15px; border-radius:var(--radius); outline:none; font-family:inherit;" placeholder="Enter command for Senpixel Intelligence..."></textarea>
                    <button class="btn-main" style="margin-top:15px;" id="askAiBtn">Process Request</button>
                </div>
                <div id="aiResponse" class="card" style="display:none; white-space: pre-wrap; border-left: 3px solid var(--accent);"></div>
            </div>
        </div>

        <!-- Settings View -->
        <div id="view-settings" class="view-container">
            <div class="generic-view">
                <h2>⚙️ SYSTEM_CONFIG</h2>
                <div class="card">
                    <p style="margin-bottom:10px;">User ID: <span id="userId" style="color:var(--accent);">...</span></p>
                    <p style="margin-bottom:20px; font-size:0.8rem; color:var(--text-dim);">Encryption: E2EE AES-256</p>
                    <button class="btn-main" id="logoutBtn" style="border-color:#555; color:#888;">Disconnect</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // === CONFIGURATION ===
    const SUPABASE_URL = 'ВАШ_SUPABASE_URL';
    const SUPABASE_KEY = 'ВАШ_SUPABASE_KEY';
    const OPENROUTER_KEY = 'ВАШ_OPENROUTER_KEY';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    const state = {
        user: null,
        chat: null,
        subscription: null
    };

    const dom = {
        app: document.getElementById('app'),
        auth: document.getElementById('authModal'),
        chatList: document.getElementById('chatList'),
        messages: document.getElementById('messages'),
        input: document.getElementById('msgInput'),
        header: document.getElementById('chatHeader'),
        inputArea: document.getElementById('inputArea')
    };

    // === AUTH LOGIC ===
    window.onload = async () => {
        const { data: { session } } = await supabase.auth.getSession();
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').remove();
                if (session) startApp(session.user);
                else dom.auth.style.display = 'flex';
            }, 500);
        }, 1200);
    };

    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) document.getElementById('authError').innerText = error.message;
        else location.reload();
    };

    // === APP LOGIC ===
    function startApp(user) {
        state.user = user;
        dom.auth.remove();
        dom.app.style.display = 'flex';
        document.getElementById('userId').innerText = user.email.split('@')[0];
        loadChats();
    }

    async function loadChats() {
        const { data } = await supabase.from('chat_participants').select('chat_id, chats(id, name)').eq('user_id', state.user.id);
        dom.chatList.innerHTML = data?.length ? '' : '<p style="padding:20px; opacity:0.3;">No channels available.</p>';
        
        data?.forEach(item => {
            const chat = item.chats;
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.innerHTML = `<div class="avatar">${chat.name[0].toUpperCase()}</div><div style="flex:1"><strong>${chat.name}</strong></div>`;
            div.onclick = () => openChat(chat, div);
            dom.chatList.appendChild(div);
        });
    }

    async function openChat(chat, el) {
        if (state.subscription) supabase.removeChannel(state.subscription);
        state.chat = chat;

        document.querySelectorAll('.chat-item').forEach(c => c.classList.remove('active'));
        el.classList.add('active');

        dom.header.style.display = 'flex';
        dom.inputArea.style.display = 'flex';
        document.getElementById('activeChatName').innerText = chat.name;
        document.getElementById('activeAvatar').innerText = chat.name[0].toUpperCase();

        const { data: msgs } = await supabase.from('messages').select('*').eq('chat_id', chat.id).order('created_at', {ascending: true});
        dom.messages.innerHTML = '';
        msgs?.forEach(renderMessage);
        scrollBottom();

        state.subscription = supabase.channel(`chat:${chat.id}`).on('postgres_changes', 
            {event: 'INSERT', schema: 'public', table: 'messages', filter: `chat_id=eq.${chat.id}`}, 
            payload => renderMessage(payload.new)
        ).subscribe();
    }

    function renderMessage(msg) {
        const isOwn = msg.user_id === state.user.id;
        const div = document.createElement('div');
        div.className = `message ${isOwn ? 'own' : 'other'}`;
        const time = new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        
        // Защита от XSS (вставка как текст)
        const content = document.createElement('div');
        content.textContent = msg.content;
        
        div.innerHTML = `<div>${content.innerHTML}</div><small style="display:block; text-align:right; opacity:0.4; font-size:0.7rem; margin-top:5px;">${time}</small>`;
        dom.messages.appendChild(div);
        scrollBottom();
    }

    async function sendMessage() {
        const text = dom.input.value.trim();
        if (!text || !state.chat) return;
        dom.input.value = '';
        dom.input.style.height = 'auto';
        await supabase.from('messages').insert({ chat_id: state.chat.id, user_id: state.user.id, content: text });
    }

    // Обработчики ввода
    dom.input.oninput = function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; };
    dom.input.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
    document.getElementById('sendBtn').onclick = sendMessage;

    // Вкладки
    document.querySelectorAll('.nav-tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.nav-tab, .view-container').forEach(el => el.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(tab.dataset.target).classList.add('active');
        };
    });

    // AI Logic
    document.getElementById('askAiBtn').onclick = async () => {
        const prompt = document.getElementById('aiPrompt').value.trim();
        const resBox = document.getElementById('aiResponse');
        if(!prompt) return;
        resBox.style.display = 'block';
        resBox.innerText = '// PROCESSING_...';

        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${OPENROUTER_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ "model": "google/gemini-2.0-flash-001", "messages": [{role: "user", content: prompt}] })
            });
            const data = await response.json();
            resBox.innerText = data.choices[0].message.content;
        } catch (err) { resBox.innerText = '// ERROR: UPLINK_FAILED'; }
    };

    function scrollBottom() { dom.messages.scrollTop = dom.messages.scrollHeight; }
    document.getElementById('logoutBtn').onclick = () => { supabase.auth.signOut(); location.reload(); };
</script>

</body>
</html>
