<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senpixel Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #3ecf8e; --bg: #0b0e11; --card: #151921; --text: #e0e6ed; }
        body, html { margin: 0; padding: 0; height: 100vh; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        #app { display: flex; height: 100vh; }
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* Сообщения */
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 15px; position: relative; animation: slideIn 0.2s ease; }
        .msg.sent { align-self: flex-end; background: var(--primary); color: #000; }
        .msg.received { align-self: flex-start; background: var(--card); }
        
        /* Статус прочитано */
        .status-icon { font-size: 0.7rem; margin-left: 5px; opacity: 0.7; }
        .read { color: #3498db; } /* Синие галочки */

        /* Индикатор печати */
        #typing-indicator { height: 20px; padding: 0 25px; font-size: 0.8rem; color: var(--primary); font-style: italic; transition: 0.3s; opacity: 0; }

        /* Анимация */
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

        /* Панель ввода */
        .input-bar { padding: 15px; background: var(--card); display: flex; gap: 10px; align-items: center; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #333; background: #1c2128; color: white; outline: none; }
        
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 style="color: var(--primary)">SENPIXEL</h1>
        <button onclick="signInWithGoogle()" style="padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold;">Войти через Google</button>
    </div>

    <div id="app">
        <div class="main-content">
            <div class="header" style="padding: 15px; background: var(--card); border-bottom: 1px solid #222;">
                <span id="chat-title">Общий чат</span>
                <span id="online-count" style="font-size: 0.7rem; color: var(--primary); margin-left: 10px;"></span>
            </div>

            <div id="messages"></div>
            
            <div id="typing-indicator"></div>

            <div class="input-bar">
                <input type="text" id="msgInput" placeholder="Сообщение..." 
                       oninput="handleTyping()" 
                       onkeypress="if(event.key==='Enter') send()">
                <button onclick="send()" style="background: var(--primary); border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer;"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://kwotdvdjxhpttuwhgjkh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_i6HL03F98ZmxCKmAKQDaLQ_w6u7ep4d';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let user = null;
        let typingTimeout = null;

        async function init() {
            const { data } = await supabase.auth.getSession();
            if (data.session) setupUser(data.session.user);
        }

        async function signInWithGoogle() {
            await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
        }

        function setupUser(userData) {
            user = userData;
            document.getElementById('auth-screen').style.display = 'none';
            loadMessages();
            subscribe();
            markAllAsRead(); // При входе помечаем сообщения как прочитанные
        }

        // --- ЛОГИКА ПЕЧАТАЕТ... ---
        async function handleTyping() {
            if (!user) return;
            
            // Отправляем статус "печатает" в БД
            await supabase.from('typing_status').upsert({ user_id: user.id, user_email: user.email, is_typing: true, last_active: new Date() });

            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(async () => {
                await supabase.from('typing_status').upsert({ user_id: user.id, is_typing: false });
            }, 2000);
        }

        // --- ЛОГИКА ПРОЧИТАНО ---
        async function markAllAsRead() {
            await supabase.from('messages').update({ is_read: true }).eq('is_read', false).neq('user_id', user.id);
        }

        async function loadMessages() {
            const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: true });
            if (data) {
                document.getElementById('messages').innerHTML = '';
                data.forEach(renderMessage);
            }
        }

        function renderMessage(msg) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            const isMine = msg.user_id === user.id;

            // Галочки статуса
            const statusHtml = isMine ? `<span class="status-icon ${msg.is_read ? 'read' : ''}"><i class="fa-solid fa-check-double"></i></span>` : '';

            div.className = `msg ${isMine ? 'sent' : 'received'}`;
            div.innerHTML = `
                <div style="font-size: 0.7rem; opacity: 0.6;">${msg.user_email.split('@')[0]}</div>
                <div>${msg.text} ${statusHtml}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;

            await supabase.from('messages').insert([{ text, user_id: user.id, user_email: user.email, is_read: false }]);
            input.value = '';
            // Сразу выключаем статус печати
            await supabase.from('typing_status').upsert({ user_id: user.id, is_typing: false });
        }

        function subscribe() {
            // Подписка на сообщения
            supabase.channel('msgs').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, payload => {
                if (payload.eventType === 'INSERT') {
                    renderMessage(payload.new);
                    if (payload.new.user_id !== user.id) markAllAsRead();
                } else if (payload.eventType === 'UPDATE') {
                    loadMessages(); // Обновляем, чтобы увидеть галочки
                }
            }).subscribe();

            // Подписка на "Печатает..."
            supabase.channel('typing').on('postgres_changes', { event: '*', schema: 'public', table: 'typing_status' }, payload => {
                const indicator = document.getElementById('typing-indicator');
                const othersTyping = payload.new;
                
                if (othersTyping.user_id !== user.id && othersTyping.is_typing) {
                    indicator.innerText = `${othersTyping.user_email.split('@')[0]} печатает...`;
                    indicator.style.opacity = 1;
                } else {
                    indicator.style.opacity = 0;
                }
            }).subscribe();
        }

        init();
    </script>
</body>
</html>
