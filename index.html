<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senpixel v4.0 // NEXUS</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' blob:; worker-src 'self' blob:; connect-src 'self' https://*.supabase.co; style-src 'self' 'unsafe-inline';">
    <style>
        :root {
            --neon-green: #00ffa2;
            --neon-blue: #00e5ff;
            --bg-dark: #030508;
            --panel-bg: rgba(10, 15, 20, 0.75);
            --border: rgba(0, 255, 162, 0.2);
        }

        /* Анимированные "Живые обои" (Кибер-сетка) */
        body {
            margin: 0;
            height: 100vh;
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(0, 255, 162, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 162, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            animation: moveGrid 15s linear infinite;
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        @keyframes moveGrid {
            0% { background-position: 0 0; }
            100% { background-position: 30px 30px; }
        }

        /* Основной контейнер чата (Glassmorphism) */
        #app-container {
            width: 95%;
            max-width: 600px;
            height: 90vh;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0, 255, 162, 0.1);
            overflow: hidden;
        }

        /* Верхняя панель (AI Sentinel) */
        #header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.5);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #sentinel-logs {
            height: 80px;
            overflow-y: auto;
            font-size: 11px;
            padding: 10px 20px;
            color: var(--neon-blue);
            background: rgba(0, 10, 20, 0.9);
            border-bottom: 1px solid var(--border);
            text-shadow: 0 0 5px rgba(0, 229, 255, 0.5);
        }

        /* Зона чата */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        /* Анимация появления сообщений */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg {
            max-width: 75%;
            padding: 12px 15px;
            border-radius: 8px;
            position: relative;
            animation: slideIn 0.3s ease-out forwards;
            line-height: 1.4;
        }

        .msg.sys { align-self: center; font-size: 10px; color: #888; border: none; background: none; }
        .msg.own { align-self: flex-end; border: 1px solid var(--border); background: rgba(0, 255, 162, 0.05); box-shadow: 0 0 10px rgba(0,255,162,0.05); }
        .msg-meta { font-size: 9px; margin-bottom: 8px; opacity: 0.7; border-bottom: 1px solid rgba(0,255,162,0.2); padding-bottom: 4px; }
        .trust-badge { color: var(--neon-blue); font-weight: bold; }

        /* Ввод сообщений */
        #input-area {
            padding: 20px;
            background: rgba(0,0,0,0.6);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: rgba(0, 20, 10, 0.5);
            border: 1px solid var(--border);
            color: var(--neon-green);
            padding: 15px;
            border-radius: 6px;
            outline: none;
            font-family: inherit;
            transition: 0.3s;
        }
        input:focus { box-shadow: 0 0 15px rgba(0,255,162,0.2); }

        button {
            background: var(--neon-green);
            color: #000;
            border: none;
            padding: 0 25px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
        }
        button:hover:not(:disabled) { background: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }

        /* Скроллбар */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="header">
            <div>TITAN // NEXUS_V4.0</div>
            <div id="status-display" style="color: #ff3333; text-shadow: 0 0 10px #ff3333;">BOOTING...</div>
        </div>

        <div id="sentinel-logs"></div>

        <div id="chat-window">
            <div class="msg sys">--- SECURE TUNNEL ESTABLISHED ---</div>
        </div>

        <div id="input-area">
            <input type="text" id="m-input" placeholder="Initiate secure transmission..." autocomplete="off" disabled>
            <button id="send-btn" disabled>Wait</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
