<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senpixel Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #0f0f0f; color: #e0e0e0; }
        #auth-container { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; }
        #chat-container { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { background: #1e1e1e; padding: 12px 16px; border-radius: 12px; max-width: 85%; border-left: 4px solid #3ecf8e; align-self: flex-start; }
        .msg.mine { align-self: flex-end; border-left: none; border-right: 4px solid #3ecf8e; background: #252525; }
        .msg .user { font-size: 0.75rem; color: #3ecf8e; font-weight: bold; margin-bottom: 4px; }
        #input-area { padding: 20px; display: flex; gap: 12px; background: #181818; border-top: 1px solid #282828; }
        input { flex: 1; padding: 14px; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; outline: none; }
        button { padding: 10px 24px; cursor: pointer; border: none; border-radius: 8px; background: #3ecf8e; color: #000; font-weight: 700; }
        .google-btn { background: #ffffff; color: #000; font-size: 1rem; padding: 12px 24px; display: flex; align-items: center; gap: 10px; }
        .header { padding: 15px 25px; background: #181818; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #282828; }
    </style>
</head>
<body>

    <div id="auth-container">
        <h1 style="letter-spacing: 2px;">SENPIXEL CHAT</h1>
        <button class="google-btn" onclick="signInWithGoogle()">
            <img src="https://www.google.com/favicon.ico" width="18" alt="G"> Войти через Google
        </button>
    </div>

    <div id="chat-container">
        <div class="header">
            <span id="user-email" style="font-weight: 500; color: #3ecf8e;"></span>
            <button onclick="signOut()" style="background: #ff4d4d; color: white; padding: 6px 12px; border-radius: 5px;">Выйти</button>
        </div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="messageInput" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">ОТПРАВИТЬ</button>
        </div>
    </div>

    <script>
        // --- КОНФИГУРАЦИЯ ---
        const SUPABASE_URL = 'https://kwotdvdjxhpttuwhgjkh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_i6HL03F98ZmxCKmAKQDaLQ_w6u7ep4d'; 

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const authContainer = document.getElementById('auth-container');
        const chatContainer = document.getElementById('chat-container');
        const messagesDiv = document.getElementById('messages');
        const userEmailSpan = document.getElementById('user-email');

        let currentUser = null;

        // Инициализация сессии
        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                setupUser(session.user);
            }
        }

        async function signInWithGoogle() {
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: 'https://m40503528-pixel.github.io/senpixel-chat/'
                }
            });
            if (error) console.error("Ошибка входа:", error.message);
        }

        async function signOut() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        function setupUser(user) {
            currentUser = user;
            authContainer.style.display = 'none';
            chatContainer.style.display = 'flex';
            userEmailSpan.innerText = user.email;
            loadMessages();
            subscribeToRealtime();
        }

        async function loadMessages() {
            const { data, error } = await supabaseClient
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true });
            
            if (data) {
                messagesDiv.innerHTML = '';
                data.forEach(addMessageToUI);
            }
        }

        function addMessageToUI(msg) {
            const div = document.createElement('div');
            // Если сообщение от текущего пользователя - добавим класс mine
            const isMine = msg.user_id === currentUser?.id;
            div.className = `msg ${isMine ? 'mine' : ''}`;
            div.innerHTML = `<div class="user">${msg.user_email || 'User'}</div><div>${msg.text}</div>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const val = input.value.trim();
            if (!val || !currentUser) return;

            const { error } = await supabaseClient
                .from('messages')
                .insert([{ 
                    text: val, 
                    user_id: currentUser.id, 
                    user_email: currentUser.email 
                }]);

            if (error) console.error("Ошибка базы данных:", error.message);
            input.value = '';
        }

        function subscribeToRealtime() {
            supabaseClient
                .channel('messages-realtime')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    addMessageToUI(payload.new);
                })
                .subscribe();
        }

        // Слушатель изменения состояния авторизации
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) {
                setupUser(session.user);
            }
        });

        init();
    </script>
</body>
</html>
