<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senpixel v3.5.2 // Omni-Protocol</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' blob:; worker-src 'self' blob:; connect-src 'self' https://*.supabase.co; style-src 'self' 'unsafe-inline';">
    <style>
        :root { --neon: #00ffa2; --bg: #050505; --panel: #0a0a0a; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* ТЕРМИНАЛ И СТАТУС */
        #header { padding: 10px 20px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; font-size: 12px; background: var(--panel); }
        #sentinel-logs { height: 60px; overflow-y: auto; font-size: 10px; padding: 5px 20px; color: #008855; border-bottom: 1px solid #111; }

        /* ЗОНА СООБЩЕНИЙ */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px; border: 1px solid #111; position: relative; }
        .msg.own { align-self: flex-end; border-color: var(--neon); background: rgba(0, 255, 162, 0.05); }
        .msg-meta { font-size: 9px; margin-bottom: 5px; opacity: 0.6; }
        .trust-badge { color: var(--neon); font-weight: bold; margin-left: 5px; }

        /* ВВОД */
        #input-area { padding: 20px; background: var(--panel); border-top: 1px solid #111; display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid #111; color: var(--neon); padding: 12px; outline: none; }
        button { background: var(--neon); color: #000; border: none; padding: 0 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:disabled { opacity: 0.3; }
    </style>
</head>
<body>

    <div id="header">
        <div>SENPIXEL_OMNI_V3.5.2</div>
        <div id="status-display">CORE_OFFLINE</div>
    </div>

    <div id="sentinel-logs"></div>

    <div id="chat-window">
        </div>

    <div id="input-area">
        <input type="text" id="m-input" placeholder="Введите зашифрованное сообщение..." autocomplete="off">
        <button id="send-btn" disabled>Initialize</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
