    let stateVault = new Map(); // Sealed states
    let intentStore = new Set();

    self.onmessage = async function(e) {
        const { type, payload, intentToken, intentId } = e.data;

        switch(type) {
            case 'INIT_SESSION':
                const initialState = { 
                    rootKey: payload.rootKey, 
                    Ns: 0, Nr: 0, PN: 0, 
                    skipped: new Map() 
                };
                stateVault.set(payload.peerId, initialState);
                // Сохраняем "запечатанное" состояние в БД (Sealed State)
                await saveSealedState(payload.peerId, initialState);
                break;

            case 'ENCRYPT':
                // ПРОВЕРКА INTENT & REPLAY
                if (!intentToken || intentStore.has(intentId)) throw new Error("SECURITY_VIOLATION");
                intentStore.add(intentId);

                const session = stateVault.get(payload.peerId);
                if (!session) throw new Error("SESSION_NOT_FOUND");

                const encryptedData = await doubleRatchetEncrypt(session, payload.text);
                self.postMessage({ type: 'ENCRYPTED', data: encryptedData });
                break;
        }
    };

        // Используем AES-GCM с ключом, живущим только в Worker

</script>

<script>
    // --- MAIN UI THREAD ---
    const workerBlob = new Blob([document.getElementById('titan-worker').textContent], { type: 'application/javascript' });
    const titanWorker = new Worker(URL.createObjectURL(workerBlob));

    async function handleSecureSend() {
        const text = document.getElementById('msg-input').value;
        const intentId = crypto.randomUUID();

        // 🛡️ WebAuthn / Hardened Intent
        // В проде здесь: const credential = await navigator.credentials.get(...)
        // Это гарантирует, что действие совершил человек
        const intentToken = crypto.getRandomValues(new Uint8Array(32));

        titanWorker.postMessage({
            type: 'ENCRYPT',
            payload: { text, peerId: 'target_user' },
            intentId,
            intentToken
        });
    }

    // Инициализация (Persistent State Recovery)
    async function bootstrap() {
        // 1. Пытаемся восстановить сессию из IndexedDB
        // 2. Если есть - шлем в Worker зашифрованный блоб
        titanWorker.postMessage({ type: 'INIT_SESSION', payload: { peerId: 'target_user', rootKey: '...' } });
    }
    
    bootstrap();
</script>
